version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ml-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-ml_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ml_password}
      POSTGRES_DB: ${DB_NAME:-ml_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ml_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ml-redis
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml-network

  # FastAPI ML Service
  fastapi:
    build:
      context: ./fastapi-app
      dockerfile: Dockerfile
    container_name: ml-fastapi
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ml_db}
      DB_USER: ${DB_USER:-ml_user}
      DB_PASSWORD: ${DB_PASSWORD:-ml_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USE_REDIS: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ml-network
    volumes:
      - ./fastapi-app:/app

  # Streamlit Frontend
  streamlit:
    build:
      context: ./streamlit-app
      dockerfile: Dockerfile
    container_name: ml-streamlit
    environment:
      FASTAPI_URL: http://fastapi:8000
    ports:
      - "8501:8501"
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - ml-network
    volumes:
      - ./streamlit-app:/app

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: ml-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - ml-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: ml-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-grafana}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ml-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  ml-network:
    driver: bridge
