scrapy_interval: 15s
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: ml-project
    environment: local

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
- job_name: 'prometheus'
  static_configs:
  - targets: ['localhost:9090']

- job_name: 'fastapi'
  static_configs:
  - targets: ['fastapi:8000']
  metrics_path: '/metrics'
  scrape_interval: 15s
  scrape_timeout: 10s

- job_name: 'postgres'
  static_configs:
  - targets: ['postgres:5432']

- job_name: 'redis'
  static_configs:
  - targets: ['redis:6379']
